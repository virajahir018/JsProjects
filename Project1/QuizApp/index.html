<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Quiz App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="quiz-container">
  <h2 id="question">Question text</h2>

  <ul>
    <li><button class="answer" onclick="checkAnswer(0)"></button></li>
    <li><button class="answer" onclick="checkAnswer(1)"></button></li>
    <li><button class="answer" onclick="checkAnswer(2)"></button></li>
    <li><button class="answer" onclick="checkAnswer(3)"></button></li>
  </ul>

  <button id="nextBtn" onclick="nextQuestion()">Next</button>
</div>

<script src="script.js"></script>
</body>
</html>
